name: STOX Daily Trade Card + Performance Update

on:
  schedule:
    - cron: '30 22 * * *'  # 10:30 PM UTC = ~5:30 PM EST daily close
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  stox-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run STOX hourly job (ensure fresh signals at close)
        run: python bot.py --mode hourly
        env:
          PYTHONUNBUFFERED: "1"

      - name: Run STOX daily job (trade card + performance + site)
        run: python bot.py --mode daily
        env:
          PYTHONUNBUFFERED: "1"

      - name: Commit updated data and site
        run: |
          git config --local user.email "stox-bot@github.com"
          git config --local user.name "STOX Bot"
          git add data/ docs/ || true
          git diff --staged --quiet || git commit -m "📊 STOX daily report [$(date -u '+%Y-%m-%d')]"
          git push
